@if (supaservice.isLoggedIn()) {
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" [routerLink]="['/plantes_table']">Solarium</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a
              class="nav-link"
              [routerLink]="['/plantes_table']"
              routerLinkActive="active"
              aria-current="page"
              >Taula de plantes</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/plantes']" routerLinkActive="active">Plantes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/mapa']" routerLinkActive="active">Mapa</a>
          </li>
        </ul>
        <div class="ms-auto d-flex align-items-center gap-3">
          <img
            class="avatar-circle"
            [src]="supaservice.getCurrentUserAvatar()"
            alt="Foto de perfil"
          />
          <a class="text-muted small profile-link" [routerLink]="['/perfil']">
            {{ supaservice.getCurrentUserEmail() }}
          </a>
          <button class="btn btn-outline-secondary" type="button" (click)="logout()">
            Tanca sessió
          </button>
        </div>
      </div>
    </div>
  </nav>
}
