<div class="register-container">
  <h1>Solarium</h1>
  <img src="/energia-solar.png" alt="Energía solar" class="register-image" />

  <div class="container">
    <form [formGroup]="formulario" (ngSubmit)="signup()">
      <div class="form-group">
        <label for="fullName">Full name</label>
        <input type="text" class="form-control" id="fullName" formControlName="fullName" />
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" class="form-control" id="email" formControlName="email" />
        <small *ngIf="emailNotValid" class="form-text text-danger">Enter a valid email.</small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" class="form-control" id="password" formControlName="password" />
        <small *ngIf="passwordNotValid" class="form-text text-danger"
          >Password must be at least 8 characters.</small
        >
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input
          type="password"
          class="form-control"
          id="confirmPassword"
          formControlName="confirmPassword"
        />
        <small *ngIf="confirmPasswordNotValid" class="form-text text-danger"
          >Confirm your password.</small
        >
        <small *ngIf="passwordMismatch" class="form-text text-danger"
          >Passwords do not match.</small
        >
      </div>

      <button type="submit" class="btn btn-primary">Create account</button>
    </form>

    <div *ngIf="errorMessage" class="text-danger mt-2">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="text-success mt-2">{{ successMessage }}</div>
    <a [routerLink]="['/home']" class="login-link">Volver al login</a>
  </div>
</div>
